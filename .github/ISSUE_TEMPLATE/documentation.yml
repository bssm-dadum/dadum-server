name: Documentation
description: 문서 작성 및 개선 관련 이슈
title: "[Docs] "
labels: ["documentation"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## 📚 문서 관련 작업

  - type: textarea
    id: doc_description
    attributes:
      label: 문서 내용
      description: 어떤 문서를 작성/수정해야 하는지 작성해주세요.
      placeholder: ex) API 명세서에 회원가입 부분 추가 필요
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 필요 이유
      description: 왜 이 문서가 필요한지 설명해주세요.
      placeholder: ex) 신규 개발자가 API 이해하기 어려움
    validations:
      required: true
